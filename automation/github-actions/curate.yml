name: Curate Projects

on:
  workflow_dispatch:
  push:
    branches: [ main ]
  schedule:
    - cron: "22 3 * * 1"

permissions:
  contents: write

jobs:
  curate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Refresh scoreboard
        run: python scripts/curate_projects.py
      - name: Validate project cards
        run: |
          python -m compileall scripts
          python scripts/curate_projects.py
      - name: Commit refreshed scoreboard
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: refresh project scoreboard"
          file_pattern: docs/PROJECT_SCOREBOARD.md
